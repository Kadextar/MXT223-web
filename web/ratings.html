<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг - МХТ-223</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/ratings.css?v=78">
    <meta name="theme-color" content="#fff7ed">
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1" style="background: rgba(245, 158, 11, 0.2);"></div>
        <div class="globe globe-3" style="background: rgba(251, 191, 36, 0.2);"></div>
    </div>

    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <h1>Рейтинг</h1>
                <p class="subtitle">Отзывы и топы</p>
            </div>
        </header>

        <!-- Tabs -->
        <div class="academics-tabs" style="height: auto; min-height: 0;">
            <div class="tabs-pill" style="margin: 0 auto;">
                <button class="tab-btn active" id="tab-btn-eval">Оценка</button>
                <button class="tab-btn" id="tab-btn-rate">Лидеры</button>
            </div>
        </div>

        <main class="ratings-container" style="padding-bottom: 100px; margin-top: 20px;">

            <!-- VIEW: EVALUATION -->
            <div id="evaluation-view">
                <div id="loading" class="empty-state hidden">
                    <p>Загрузка...</p>
                </div>

                <div id="empty-state" class="empty-state hidden">
                    <p>Нет занятий для оценки</p>
                </div>

                <div id="teachers-container" class="subjects-column">
                    <!-- Cards injected here -->
                </div>
            </div>

            <!-- VIEW: LEADERBOARD -->
            <div id="leaderboard-view" class="hidden">
                <h3 style="text-align: center; color: var(--text-main); margin-bottom: 20px;">Топ-3 Предметов</h3>
                <div id="leaderboard-list">
                    <!-- Leaderboard items -->
                </div>
            </div>

        </main>

        <!-- Modal -->
        <div id="rating-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-teacher-name">
            <div class="modal-overlay" aria-hidden="true"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-teacher-name">Преподаватель</h2>
                    <p id="modal-subject" class="text-muted">Предмет</p>
                </div>

                <form id="rating-form">
                    <!-- Rating Logic -->
                    <div class="rating-section">
                        <label>Ваша оценка:</label>
                        <div class="rating-display" id="rating-verdict">
                            <span class="rating-emoji">😐</span>
                            <span class="rating-text">Нормально</span>
                        </div>
                        <div class="rating-value-row"
                            style="display: flex; gap: 10px; align-items: center; justify-content: center; margin: 15px 0;">
                            <input type="number" id="rating-number" value="50" min="0" max="100"
                                class="rating-number-input">
                            <span>/ 100</span>
                        </div>
                        <input type="range" id="rating-range" min="0" max="100" value="50" class="rating-slider">
                        <input type="hidden" id="rating-input" name="rating" value="50">
                    </div>

                    <div class="tags-section">
                        <label>Что понравилось/не понравилось?</label>
                        <div class="tags-grid">
                            <span class="tag-btn" data-tag="clear">Понятно</span>
                            <span class="tag-btn" data-tag="interesting">Интересно</span>
                            <span class="tag-btn" data-tag="boring">Скучно</span>
                            <span class="tag-btn" data-tag="hard">Сложно</span>
                            <span class="tag-btn" data-tag="useful">Полезно</span>
                        </div>
                    </div>

                    <!-- Lesson Selection Logic (Hidden for now in JS logic) -->
                    <div id="no-lessons-alert" class="alert-box hidden"
                        style="background: rgba(255,0,0,0.1); color: #ef4444; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
                        Сегодня не было этого занятия
                    </div>
                    <p id="select-lesson-label" class="hidden">Выберите занятие:</p>
                    <div id="lessons-list" class="lessons-list hidden"></div>

                    <div class="form-group">
                        <textarea id="comment-input" placeholder="Комментарий (анонимно)..." rows="3"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Отправить анонимно</button>
                    <!-- Back button strictly for logic, usually hidden -->
                    <button type="button" id="back-to-lessons" style="display:none;">Назад</button>
                    <button type="button" id="close-modal" class="back-btn" style="margin-top: 10px;">Отмена</button>
                </form>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="profile-nav" aria-label="Основное меню">
            <a href="/" class="nav-link" title="Меню"><i class="fas fa-th-large"></i></a>
            <a href="/academics.html" class="nav-link" title="Предметы"><i class="fas fa-book"></i></a>
            <a href="/ratings.html" class="nav-link active" title="Рейтинг"><i class="fas fa-star"></i></a>
            <a href="/profile.html" class="nav-link" title="Профиль"><i class="fas fa-user"></i></a>
        </nav>
    </div>

    <script type="module" src="/static/ratings.js?v=78"></script>
</body>

</html>
