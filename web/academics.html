<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предметы - МХТ-223</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/academics.css?v=78">
    <link rel="stylesheet" href="/static/exams.css">
    <meta name="theme-color" content="#ecfdf5">
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1" style="background: rgba(16, 185, 129, 0.2);"></div>
        <div class="globe globe-2" style="background: rgba(5, 150, 105, 0.2);"></div>
    </div>

    <div class="app-container">
        <header class="header-greeting-container" style="padding-top: 20px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <h1 class="greeting-date" style="font-size: 1.8rem; margin: 0;">Мои Курсы</h1>
                <button class="nav-btn" aria-label="Поиск" style="width: 40px; height: 40px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--card-border);">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </header>

        <!-- New Premium Tabs -->
        <div class="academics-tabs premium-tabs">
            <button type="button" class="tab-btn active" id="tab-btn-all">Все</button>
            <button type="button" class="tab-btn" id="tab-btn-mandatory">Обязательные</button>
            <button type="button" class="tab-btn" id="tab-btn-optional">Факультативы</button>
        </div>

        <main class="academics-container" style="padding-bottom: 100px; margin-top: 20px;">

            <!-- VIEW: Предметы (Курсы) -->
            <div id="subjects-view">
                <div id="subjects-list" class="subjects-grid">
                    
                    <!-- Premium Course Card (Mock) -->
                    <div class="premium-course-card">
                        <div class="course-cover-img" style="background-image: url('https://images.unsplash.com/photo-1542314831-c6a4d14effd4?q=80&w=600&auto=format&fit=crop');">
                            <!-- Image bg -->
                        </div>
                        <div class="course-card-content">
                            <div class="course-header-row">
                                <span class="course-tag">ОБЯЗАТЕЛЬНЫЙ ПРЕДМЕТ</span>
                                <div class="course-credits"><span>5</span><br>Кредитов</div>
                            </div>
                            <h3 class="course-title">Международный<br>гостиничный бизнес</h3>
                            
                            <div class="course-progress-section">
                                <div class="progress-row">
                                    <span class="progress-label">Лекции</span>
                                    <span class="progress-value">11/18</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" style="width: 61%;"></div>
                                </div>
                                
                                <div class="progress-row">
                                    <span class="progress-label">Семинары</span>
                                    <span class="progress-value">4/8</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" style="width: 50%;"></div>
                                </div>
                            </div>
                            
                            <button class="primary-action-btn course-action-btn">Продолжить обучение</button>
                        </div>
                    </div>
                    <!-- /Premium Course Card -->

                    <div class="empty-state hidden">
                        <p>Загрузка предметов...</p>
                    </div>
                </div>
                <div class="section-title"
                    style="margin-top: 30px; margin-bottom: 15px; padding: 0 20px; display: none;">
                    Преподаватели</div>
                <div id="teachers-list" class="teachers-list" style="display: none;"></div>
            </div>

            <!-- VIEW: Экзамены и Дедлайны -->
            <div id="exams-view" class="hidden">
                <div class="section-title" style="margin: 0 20px 15px;">Мои дедлайны</div>
                <div class="deadline-form-container"
                    style="margin: 0 20px 20px; background: var(--card-bg); padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--card-border);">
                    <form id="deadline-form" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                        <input type="text" id="deadline-title" placeholder="Что нужно сделать?" required
                            class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
                        <input type="date" id="deadline-date" required class="form-group"
                            style="width: auto; margin-bottom: 0;">
                        <button type="submit" class="submit-btn"
                            style="width: auto; padding: 10px 15px; font-size: 0.9rem;">Добавить</button>
                    </form>
                </div>

                <ul id="deadlines-list" class="deadlines-list"
                    style="margin: 0 20px 30px; padding: 0; list-style: none;">
                    <li class="empty-state text-muted" style="text-align: center;">Загрузка дедлайнов...</li>
                </ul>

                <div class="section-title" style="margin: 0 20px 15px;">Экзамены и сессии</div>
                <div id="exams-list" class="exams-list">
                    <div class="empty-state">
                        <p>Загрузка экзаменов...</p>
                    </div>
                </div>
            </div>

        </main>

        <!-- Subject detail modal -->
        <div id="subject-modal" class="modal hidden" aria-modal="true">
            <div class="modal-overlay subject-modal-overlay"></div>
            <div class="modal-content subject-modal-content">
                <button type="button" class="subject-modal-close" id="subject-modal-close" aria-label="Закрыть"><i
                        class="fas fa-times"></i></button>
                <div id="subject-modal-body"><!-- filled by JS --></div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="profile-nav" role="navigation" aria-label="Главное меню">
            <a href="/" class="nav-link" aria-current="page" aria-label="Главная">
                <i class="fas fa-th-large" aria-hidden="true"></i>
                <span>Главная</span>
            </a>
            <a href="/academics.html" class="nav-link active" aria-label="Курсы">
                <i class="fas fa-book" aria-hidden="true"></i>
                <span>Курсы</span>
            </a>
            <a href="/ratings.html" class="nav-link" aria-label="Рейтинг">
                <i class="fas fa-chart-line" aria-hidden="true"></i>
                <span>Рейтинг</span>
            </a>
            <a href="/profile.html" class="nav-link" aria-label="Профиль">
                <i class="fas fa-user" aria-hidden="true"></i>
                <span>Профиль</span>
            </a>
        </nav>
    </div>

    <script type="module" src="/static/academics.js?v=78"></script>
</body>

</html>
